<!-- @dsCard group="Type" viewport="700x210" name="Numeric — JetBrains Mono" subtitle="Tabular times, points and positions — digits always align" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface); font-family: var(--font-ui); padding: 24px; }
  .spec { display: flex; align-items: baseline; gap: 16px; padding: 10px 0; border-bottom: 1px solid var(--border-light); }
  .spec:last-child { border-bottom: 0; }
  .tag { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); width: 150px; flex: none; }
  .n { font-family: var(--font-mono); font-variant-numeric: tabular-nums; color: var(--text-primary); letter-spacing: -0.01em; }
</style>
</head>
<body>
  <div class="spec"><span class="tag">Numbers L · 32 · 700</span><span class="n" style="font-size:32px;font-weight:700">00:49.352</span></div>
  <div class="spec"><span class="tag">Numbers M · 20 · 600</span><span class="n" style="font-size:20px;font-weight:600">316 <span style="font-size:13px;color:var(--text-muted);font-family:var(--font-ui)">pts</span></span></div>
  <div class="spec"><span class="tag">Numbers S · 14 · 500</span><span class="n" style="font-size:14px;font-weight:500">+2.318</span> &nbsp; <span class="n" style="font-size:14px;font-weight:500;color:var(--success)">-0.412</span></div>
</body>
</html>
