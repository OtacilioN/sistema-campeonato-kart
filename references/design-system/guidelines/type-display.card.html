<!-- @dsCard group="Type" viewport="700x260" name="Display — Barlow Condensed" subtitle="Heading scale XL→S, condensed sporting headings" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface); font-family: var(--font-ui); padding: 24px; }
  .spec { display: flex; align-items: baseline; gap: 16px; padding: 8px 0; border-bottom: 1px solid var(--border-light); }
  .spec:last-child { border-bottom: 0; }
  .tag { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); width: 130px; flex: none; }
  .d { font-family: var(--font-display); color: var(--text-primary); letter-spacing: -0.01em; }
</style>
</head>
<body>
  <div class="spec"><span class="tag">Heading XL · 32/38 · 700</span><span class="d" style="font-size:32px;line-height:38px;font-weight:700">Velocidade Máxima</span></div>
  <div class="spec"><span class="tag">Heading L · 28/34 · 700</span><span class="d" style="font-size:28px;line-height:34px;font-weight:700">Ranking da temporada</span></div>
  <div class="spec"><span class="tag">Heading M · 24/30 · 600</span><span class="d" style="font-size:24px;line-height:30px;font-weight:600">Perfil do competidor</span></div>
  <div class="spec"><span class="tag">Heading S · 20/26 · 600</span><span class="d" style="font-size:20px;line-height:26px;font-weight:600">Como funciona a pontuação</span></div>
</body>
</html>
