<!-- @dsCard group="Colors" viewport="700x190" name="Brand colors" subtitle="Red, dark racing neutrals — the action + strength palette" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--off-white); font-family: var(--font-ui); padding: 20px; }
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }
  .sw { border-radius: var(--radius-md); border: 1px solid var(--border-light); overflow: hidden; }
  .chip { height: 60px; }
  .meta { padding: 8px 10px; }
  .name { font-size: 12px; font-weight: 600; color: var(--text-primary); }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-top: 2px; }
</style>
</head>
<body>
<div class="grid">
  <div class="sw"><div class="chip" style="background:#E10600"></div><div class="meta"><div class="name">Brand Red</div><div class="hex">#E10600</div></div></div>
  <div class="sw"><div class="chip" style="background:#A80000"></div><div class="meta"><div class="name">Red Dark</div><div class="hex">#A80000</div></div></div>
  <div class="sw"><div class="chip" style="background:#FFE8E6"></div><div class="meta"><div class="name">Red Soft</div><div class="hex">#FFE8E6</div></div></div>
  <div class="sw"><div class="chip" style="background:#070707"></div><div class="meta"><div class="name">Racing Black</div><div class="hex">#070707</div></div></div>
  <div class="sw"><div class="chip" style="background:#121212"></div><div class="meta"><div class="name">Carbon</div><div class="hex">#121212</div></div></div>
  <div class="sw"><div class="chip" style="background:#242424"></div><div class="meta"><div class="name">Graphite</div><div class="hex">#242424</div></div></div>
</div>
</body>
</html>
