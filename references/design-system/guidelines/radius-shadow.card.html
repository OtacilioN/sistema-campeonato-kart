<!-- @dsCard group="Spacing" viewport="700x180" name="Radius & shadows" subtitle="Corner radii and the two-level shadow system" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--off-white); font-family: var(--font-ui); padding: 22px; }
  .wrap { display: flex; align-items: center; gap: 28px; flex-wrap: wrap; }
  .group { display: flex; gap: 14px; align-items: flex-end; }
  .item { text-align: center; }
  .box { width: 64px; height: 56px; background: #fff; border: 1px solid var(--border-light); }
  .t { font-family: var(--font-mono); font-size: 10px; color: var(--text-secondary); margin-top: 7px; }
  .lbl { font-size: 11px; font-weight: 700; letter-spacing:.06em; text-transform:uppercase; color: var(--text-muted); width:100%; margin-bottom: 12px; }
</style>
</head>
<body>
  <div class="lbl">Corner radii</div>
  <div class="wrap" style="margin-bottom:22px">
    <div class="group">
      <div class="item"><div class="box" style="border-radius:4px"></div><div class="t">xs · 4</div></div>
      <div class="item"><div class="box" style="border-radius:8px"></div><div class="t">sm · 8</div></div>
      <div class="item"><div class="box" style="border-radius:12px"></div><div class="t">md · 12</div></div>
      <div class="item"><div class="box" style="border-radius:16px"></div><div class="t">lg · 16</div></div>
      <div class="item"><div class="box" style="border-radius:24px"></div><div class="t">xl · 24</div></div>
      <div class="item"><div class="box" style="border-radius:999px"></div><div class="t">pill</div></div>
    </div>
  </div>
  <div class="lbl">Shadows</div>
  <div class="wrap">
    <div class="item"><div class="box" style="border-radius:16px;box-shadow:0 4px 12px rgba(0,0,0,.06);border:none"></div><div class="t">card</div></div>
    <div class="item"><div class="box" style="border-radius:16px;box-shadow:0 8px 24px rgba(0,0,0,.10);border:none"></div><div class="t">floating</div></div>
  </div>
</body>
</html>
