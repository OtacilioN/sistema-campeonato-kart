<!-- @dsCard group="Components" viewport="700x300" name="Badges & Cards" subtitle="Feedback badges (color + icon + text) and surface cards" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--off-white); font-family: var(--font-ui); padding: 22px; }
  .row { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; margin-bottom: 18px; }
  .lbl { font-size: 11px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--text-muted); width: 100%; margin-bottom: 2px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Badge, Card } = window.VelozesDesignSystem_32dd15;
  const I = (n) => <i data-lucide={n} style={{ width: 13, height: 13 }}></i>;
  function Demo() {
    return (
      <div>
        <div className="row"><span className="lbl">Feedback badges</span>
          <Badge tone="success" icon={I("check")}>Validado</Badge>
          <Badge tone="warning" icon={I("triangle-alert")}>Nome duplicado</Badge>
          <Badge tone="danger" icon={I("x")}>Erro de arquivo</Badge>
          <Badge tone="info" icon={I("clock")}>Aguardando revisão</Badge>
          <Badge tone="brand">Próximo evento</Badge>
          <Badge tone="neutral">NC</Badge>
          <Badge tone="dark" icon={I("shield-check")}>Admin</Badge>
        </div>
        <div className="row"><span className="lbl">Cards</span></div>
        <div className="grid">
          <Card>
            <div style={{ fontFamily: "var(--font-display)", fontSize: 20, fontWeight: 600 }}>Card padrão</div>
            <div style={{ fontSize: 13, color: "var(--text-secondary)", marginTop: 4 }}>Surface branca, raio 16px, sombra leve.</div>
          </Card>
          <Card interactive>
            <div style={{ fontFamily: "var(--font-display)", fontSize: 20, fontWeight: 600 }}>Card interativo</div>
            <div style={{ fontSize: 13, color: "var(--text-secondary)", marginTop: 4 }}>Hover eleva a sombra. Toque abre detalhe.</div>
          </Card>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
  setTimeout(() => window.lucide && window.lucide.createIcons(), 60);
</script>
</body>
</html>
