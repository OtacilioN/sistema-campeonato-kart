<!-- @dsCard group="Velozes app" viewport="390x800" name="Velozes — app (interativo)" subtitle="Home, Calendário, Ranking, Perfil, Corrida e Admin — clicável" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Velozes — App</title>
<link rel="stylesheet" href="../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../_ds_bundle.js"></script>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: #E6E6EA;
    font-family: var(--font-ui);
    display: flex; justify-content: center; align-items: flex-start;
    min-height: 100%;
  }
  #phone {
    width: 100%; max-width: 412px; min-height: 100vh;
    background: var(--off-white);
    position: relative;
    box-shadow: 0 0 60px rgba(0,0,0,.12);
  }
  /* keep bottom nav docked inside the phone column */
  #phone > div { min-height: 100vh; display: flex; flex-direction: column; }
  ::-webkit-scrollbar { width: 0; }
</style>
</head>
<body>
<div id="phone"><div id="root"></div></div>

<script src="data.js"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="Charts.jsx"></script>
<script type="text/babel" src="Chrome.jsx"></script>
<script type="text/babel" src="HomeScreen.jsx"></script>
<script type="text/babel" src="CalendarScreen.jsx"></script>
<script type="text/babel" src="RankingScreen.jsx"></script>
<script type="text/babel" src="ProfileScreen.jsx"></script>
<script type="text/babel" src="RaceScreen.jsx"></script>
<script type="text/babel" src="AdminScreen.jsx"></script>
<script type="text/babel" src="App.jsx"></script>
<script type="text/babel" data-presets="react">
  const mount = () => {
    if (!window.App) { setTimeout(mount, 40); return; }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    const tick = () => window.lucide && window.lucide.createIcons({ attrs: { "stroke-width": 1.85 } });
    tick(); setInterval(tick, 400);
  };
  mount();
</script>
</body>
</html>
