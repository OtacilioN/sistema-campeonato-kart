services:
  postgres:
    image: postgres:16-alpine
    container_name: velocidade-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: velocidade
      POSTGRES_PASSWORD: velocidade
      POSTGRES_DB: velocidade_dev
    ports:
      - "54329:5432"
    volumes:
      - velocidade_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U velocidade -d velocidade_dev"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  velocidade_postgres_data:
